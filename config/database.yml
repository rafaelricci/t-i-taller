default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
  host: <%= ENV.fetch("DB_HOST", "db") %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: t_i_taller_development

test:
  <<: *default
  database: t_i_taller_test

production:
  primary: &primary_production
    <<: *default
    database: t_i_taller_production
    username: t_i_taller
    password: <%= ENV["T_I_TALLER_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: t_i_taller_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: t_i_taller_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: t_i_taller_production_cable
    migrations_paths: db/cable_migrate
